<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect x="4" y="4" width="92" height="46" rx="22" fill="url(#shine)"/>
  <!-- Bottom corners fill for shine -->
  <rect x="4" y="36" width="92" height="14" fill="url(#shine)"/>

  <!-- === BUILDINGS === -->
  <!-- Left small building -->
  <rect x="16" y="54" width="18" height="28" rx="2" fill="white" opacity="0.9"/>
  <!-- Center main building (tallest) -->
  <rect x="39" y="34" width="22" height="48" rx="2" fill="white"/>
  <!-- Right medium building -->
  <rect x="66" y="46" width="18" height="36" rx="2" fill="white" opacity="0.9"/>

  <!-- Left building windows -->
  <rect x="19" y="58" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="27" y="58" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="19" y="67" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="27" y="67" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>

  <!-- Center building windows -->
  <rect x="43" y="39" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>
  <rect x="52" y="39" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>
  <rect x="43" y="49" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>
  <rect x="52" y="49" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>
  <rect x="43" y="59" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>
  <rect x="52" y="59" width="5" height="5" rx="1" fill="#6366f1" opacity="0.45"/>

  <!-- Center building door -->
  <rect x="46" y="71" width="8" height="11" rx="1" fill="#6366f1" opacity="0.4"/>

  <!-- Right building windows -->
  <rect x="69" y="50" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="77" y="50" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="69" y="60" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="77" y="60" width="5" height="5" rx="1" fill="#6366f1" opacity="0.5"/>

  <!-- Ground -->
  <rect x="12" y="82" width="76" height="3" rx="1.5" fill="white" opacity="0.55"/>

  <!-- W monogram subtle -->
  <text x="50" y="97" font-family="'Arial Black',sans-serif" font-size="9" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.7" letter-spacing="0.5">W</text>
</svg>
